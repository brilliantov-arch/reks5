<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ARKANOID</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
}
body {
  background: #050a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  font-family: 'Courier New', monospace;
  color: #fff;
  user-select: none;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#hud {
  display: flex;
  gap: 0;
  width: 100%;
  max-width: 520px;
  padding: 6px 12px;
  background: #0a1428;
  border-bottom: 1px solid #1a4a8a;
  font-size: 11px;
  flex-shrink: 0;
  justify-content: space-between;
}
.hv { color: #00d4ff; font-size: 16px; font-weight: bold; }
.hl { color: #5599cc; font-size: 9px; text-transform: uppercase; }
#canvas-wrap {
  border-left: 2px solid #1a4a8a;
  border-right: 2px solid #1a4a8a;
  box-shadow: 0 0 30px rgba(0,100,200,0.4);
  flex-shrink: 0;
}
canvas { display: block; }
#boost-bar {
  display: flex; gap: 4px;
  width: 100%; max-width: 520px;
  padding: 4px 8px;
  background: #080f20;
  border-top: 1px solid #1a4a8a;
  flex-wrap: wrap;
  justify-content: center;
  flex-shrink: 0;
}
.bi {
  padding: 2px 7px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 10px; opacity: 0.3; transition: all 0.3s;
}
.bi.on { opacity: 1; border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.4); }
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,5,20,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 99;
  padding: 20px;
}
#popup {
  background: linear-gradient(160deg, #060e24, #0a1835);
  border: 2px solid #1a5aaa;
  border-radius: 14px;
  padding: 24px 28px;
  width: 100%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 0 50px rgba(0,120,255,0.3);
}
#ptitle { font-size: 22px; font-weight: bold; color: #00d4ff; text-shadow: 0 0 15px #00d4ff88; margin-bottom: 4px; }
#psub { font-size: 11px; color: #5599cc; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
#pdesc { font-size: 13px; color: #aaccff; line-height: 1.5; margin-bottom: 18px; }
#pstars { font-size: 26px; margin-bottom: 8px; }
#pscore { font-size: 20px; color: #ffd700; font-weight: bold; margin-bottom: 16px; }
#pbtn {
  padding: 12px 32px;
  background: linear-gradient(135deg, #005aaa, #0088ff);
  color: #fff; border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; letter-spacing: 2px;
  cursor: pointer; font-family: 'Courier New', monospace;
  text-transform: uppercase;
  box-shadow: 0 0 15px rgba(0,136,255,0.4);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
#pbtn:active { background: linear-gradient(135deg, #0077ee, #00aaff); transform: scale(0.97); }
</style>
</head>
<body>
<div id="hud">
  <div><div class="hl">Score</div><div class="hv" id="hScore">0</div></div>
  <div><div class="hl">Level</div><div class="hv" id="hLevel">1/10</div></div>
  <div><div class="hl">Lives</div><div class="hv" id="hLives">❤❤❤</div></div>
  <div><div class="hl">Best</div><div class="hv" id="hBest">0</div></div>
</div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="boost-bar">
  <div class="bi" id="bi-multi">⚡ 2BALL <span id="bt-multi"></span></div>
  <div class="bi" id="bi-wide">📏 WIDE <span id="bt-wide"></span></div>
  <div class="bi" id="bi-slow">🐢 SLOW <span id="bt-slow"></span></div>
  <div class="bi" id="bi-pierce">💎 PIERCE <span id="bt-pierce"></span></div>
  <div class="bi" id="bi-gun">🔫 GUN <span id="bt-gun"></span></div>
</div>
<div id="overlay">
  <div id="popup">
    <div id="ptitle">ARKANOID</div>
    <div id="psub">ГОТОВ?</div>
    <div id="pdesc">Разбей все кирпичи. Лови бустеры ракеткой!</div>
    <div id="pstars" style="display:none"></div>
    <div id="pscore" style="display:none"></div>
    <button id="pbtn">СТАРТ</button>
  </div>
</div>
<script>
// ── TELEGRAM MINI APP INIT ─────────────────────────────────────────────
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.disableVerticalSwipes && tg.disableVerticalSwipes();
}

// ── ADAPTIVE CANVAS SIZING ─────────────────────────────────────────────
var C=document.getElementById('c'),ctx=C.getContext('2d');

var HUD_H = document.getElementById('hud').offsetHeight || 38;
var BOOST_H = document.getElementById('boost-bar').offsetHeight || 28;
var SAFE_TOP = parseInt(getComputedStyle(document.body).paddingTop)||0;
var SAFE_BOT = parseInt(getComputedStyle(document.body).paddingBottom)||0;

var maxW = Math.min(window.innerWidth, 520);
var maxH = window.innerHeight - HUD_H - BOOST_H - SAFE_TOP - SAFE_BOT;
maxH = Math.max(maxH, 400);

// Keep game aspect close to original (520x600) but fit screen
var scale = Math.min(maxW / 520, maxH / 600);
var W = Math.floor(520 * scale);
var H = Math.floor(600 * scale);

C.width = W; C.height = H;
C.style.width = W + 'px';
C.style.height = H + 'px';
document.getElementById('canvas-wrap').style.width = W + 'px';

// Scale factor for game coordinates
var SC = scale;

// ── AUDIO ENGINE (Web Audio API — no files needed) ────────────────────
var AC=null;
function getAC(){
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

function playTone(freq,type,dur,vol,freqEnd){
  try{
    var ac=getAC();
    var osc=ac.createOscillator();
    var gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq,ac.currentTime);
    if(freqEnd!==undefined) osc.frequency.exponentialRampToValueAtTime(freqEnd,ac.currentTime+dur);
    gain.gain.setValueAtTime(vol||0.3,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    osc.start(ac.currentTime);osc.stop(ac.currentTime+dur);
  }catch(e){}
}

function playNoise(dur,vol,filterFreq){
  try{
    var ac=getAC();
    var bufSize=ac.sampleRate*dur;
    var buf=ac.createBuffer(1,bufSize,ac.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
    var src=ac.createBufferSource();src.buffer=buf;
    var filt=ac.createBiquadFilter();filt.type='bandpass';filt.frequency.value=filterFreq||800;filt.Q.value=1;
    var gain=ac.createGain();
    src.connect(filt);filt.connect(gain);gain.connect(ac.destination);
    gain.gain.setValueAtTime(vol||0.15,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    src.start();src.stop(ac.currentTime+dur);
  }catch(e){}
}

// Sound presets
var SFX={
  hit:     function(){ playTone(300,'sine',0.05,0.12,260); },                  // мяч о кирпич (не разбит)
  break:   function(){                                                          // кирпич разбит — мягкий "поп"
    playTone(600,'sine',0.08,0.2,300);
    setTimeout(function(){playTone(400,'sine',0.06,0.1,200);},30);
  },
  breakHard: function(){                                                        // прочный кирпич — насыщенный "бум"
    playTone(350,'sine',0.15,0.25,150);
    setTimeout(function(){playTone(500,'sine',0.1,0.15,250);},20);
    setTimeout(function(){playTone(250,'sine',0.08,0.1,120);},50);
  },
  paddle:  function(){ playTone(180,'sine',0.08,0.2,220); },                  // мяч о ракетку
  wall:    function(){ playTone(160,'sine',0.05,0.12,140); },                 // мяч о стену
  capsule: function(){ // капсула поймана — приятный джингл
    playTone(523,'sine',0.1,0.25);
    setTimeout(function(){playTone(659,'sine',0.1,0.25);},60);
    setTimeout(function(){playTone(784,'sine',0.15,0.3);},120);
  },
  boostMulti:  function(){ playTone(660,'square',0.2,0.25,1320); },           // 2 мяча
  boostSlow:   function(){ playTone(400,'sine',0.3,0.2,200); },               // замедление
  boostWide:   function(){                                                     // расширение ракетки
    playTone(440,'sine',0.15,0.2,660);
    setTimeout(function(){playTone(550,'sine',0.12,0.18,770);},50);
  },
  boostGun:    function(){                                                     // пулемёт — резкий пиф-паф
    playTone(800,'square',0.04,0.25,400);
  },
  gunShot:     function(){                                                     // одиночный выстрел
    playTone(900,'square',0.03,0.18,500);
  },
  boostPierce: function(){                                                     // пробивание — мягкий переливчатый аккорд
    playTone(523,'sine',0.25,0.18,784);
    setTimeout(function(){playTone(659,'sine',0.2,0.15,988);},40);
    setTimeout(function(){playTone(784,'triangle',0.3,0.12,1047);},80);
  },
  levelWin:    function(){
    [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){playTone(f,'sine',0.25,0.3);},i*100); });
  },
  gameOver:    function(){
    [180,130,100,60].forEach(function(f,i){ setTimeout(function(){playTone(f,'sine',0.4,0.2);playNoise(0.3,0.05,150);},i*160); });
  },
  loseLife:    function(){ playTone(220,'sawtooth',0.3,0.3,80); }
};

var LEVELS=[
  {name:'ALPHA SECTOR',   desc:'Три прямоугольника. Хорошая разминка!',                        layout:'triple'},
  {name:'DIAMOND FIELD',  desc:'Ромбовидное поле. Угловые — самые хитрые.',                    layout:'diamond'},
  {name:'CHEVRON',        desc:'Кирпичи стрелой. Целься в центр!',                            layout:'chevron'},
  {name:'CROSS MATRIX',   desc:'Крест. Центральные кирпичи прочнее — 2 удара.',               layout:'cross'},
  {name:'TWIN TOWERS',    desc:'Две башни усиленных блоков. Давай, пилот!',                   layout:'twin'},
  {name:'SPIRAL',         desc:'Спиральный лабиринт. Мяч будет метаться!',                    layout:'spiral'},
  {name:'FORTRESS',       desc:'Крепость. Внешние стены и мощное ядро.',                      layout:'fortress'},
  {name:'WAVE BREAKER',   desc:'Волны кирпичей. Скорость нарастает!',                         layout:'wave'},
  {name:'GRID MASTER',    desc:'Полное поле! Максимум бустеров — используй!',                 layout:'fullgrid'},
  {name:'FINAL STAND',    desc:'ФИНАЛ. Три слоя прочности. Удачи, легенда!',                  layout:'final'},
];

var ROWCOLS=['#ff4466','#ff8833','#ffdd00','#44ff88','#33aaff','#aa66ff','#ff66cc','#88ffdd','#ccbbaa','#ff6644'];
var BOOSTS=['multi','wide','slow','pierce','gun'];
var BICON={multi:'⚡',wide:'📏',slow:'🐢',pierce:'💎',gun:'🔫'};
var BCOL={multi:'#ffee44',wide:'#66ffaa',slow:'#33ddff',pierce:'#aaddff',gun:'#ff8844'};

var BW=Math.floor(46*SC),BH=Math.floor(24*SC),BPAD=Math.floor(3*SC),FLEFT=Math.floor(10*SC),FTOP=Math.floor(28*SC),COLS=10;

function mkB(c,r,hp){
  return {c:c,r:r,x:FLEFT+c*(BW+BPAD),y:FTOP+r*(BH+BPAD),w:BW,h:BH,hp:hp,maxHp:hp,
          color:ROWCOLS[r%ROWCOLS.length],boost:null,alive:true,flash:0};
}

function addBoosts(arr){
  var pool=arr.slice(),cnt=Math.max(2,Math.floor(pool.length*0.1));
  for(var i=0;i<cnt&&pool.length;i++){
    var idx=Math.floor(Math.random()*pool.length);
    pool[idx].boost=BOOSTS[Math.floor(Math.random()*BOOSTS.length)];
    pool.splice(idx,1);
  }
  return arr;
}

function buildLayout(name){
  var arr=[];
  if(name==='triple'){
    [[0,3],[3,3],[6,3]].forEach(function(sc){
      for(var r=0;r<7;r++) for(var c=sc[0];c<sc[0]+sc[1];c++) arr.push(mkB(c,r,1));
    });
  } else if(name==='diamond'){
    for(var r=0;r<10;r++) for(var c=0;c<COLS;c++)
      if(Math.abs(c-4)+Math.abs(r-5)<=4) arr.push(mkB(c,r,1));
  } else if(name==='chevron'){
    for(var c=0;c<COLS;c++){
      var top=3+Math.floor(Math.abs(c-4.5));
      for(var r=0;r<4;r++) arr.push(mkB(c,top+r,1));
    }
  } else if(name==='cross'){
    for(var r=0;r<9;r++){arr.push(mkB(4,r,2));arr.push(mkB(5,r,2));}
    for(var c=0;c<COLS;c++) if(c!==4&&c!==5){arr.push(mkB(c,4,1));arr.push(mkB(c,5,1));}
  } else if(name==='twin'){
    for(var r=0;r<10;r++){
      [1,2,3].forEach(function(c){arr.push(mkB(c,r,2));});
      [6,7,8].forEach(function(c){arr.push(mkB(c,r,2));});
    }
  } else if(name==='spiral'){
    var used={};
    function add(c,r){if(c>=0&&c<COLS&&r>=0&&r<10){var k=c+','+r;if(!used[k]){used[k]=1;arr.push(mkB(c,r,1));}}}
    for(var ring=0;ring<4;ring++){
      var c0=ring,c1=COLS-1-ring,r0=ring,r1=9-ring;
      for(var c=c0;c<=c1;c++){add(c,r0);add(c,r1);}
      for(var r=r0+1;r<r1;r++){add(c0,r);add(c1,r);}
    }
  } else if(name==='fortress'){
    for(var c=0;c<COLS;c++){arr.push(mkB(c,0,2));arr.push(mkB(c,7,2));}
    for(var r=1;r<7;r++){arr.push(mkB(0,r,2));arr.push(mkB(9,r,2));}
    for(var r=2;r<6;r++) for(var c=2;c<8;c++) arr.push(mkB(c,r,3));
  } else if(name==='wave'){
    for(var c=0;c<COLS;c++){
      var top=Math.floor(3+Math.sin(c/1.5)*2);
      for(var r=0;r<5;r++) arr.push(mkB(c,top+r,1));
    }
  } else if(name==='fullgrid'){
    for(var r=0;r<8;r++) for(var c=0;c<COLS;c++) arr.push(mkB(c,r,r<3?2:1));
  } else if(name==='final'){
    for(var r=0;r<10;r++) for(var c=0;c<COLS;c++) arr.push(mkB(c,r,r<4?3:r<7?2:1));
  }
  return addBoosts(arr);
}

var lvlIdx=0,score=0,best=0,lives=3;
var bricks=[],balls=[],capsules=[],bullets=[],activeBoosters={};
var PADDLE_W=Math.floor(90*SC), PADDLE_H=Math.floor(14*SC), BALL_R=Math.max(5,Math.floor(7*SC));
var paddle={x:W/2-PADDLE_W/2,y:H-Math.floor(38*SC),w:PADDLE_W,h:PADDLE_H};
var gameOn=false,wonLevel=false,levelStartScore=0;
var keys={},mouseX=null;
var ballLaunched=false;
var gunTimer=0;

function baseSpeed(){ return 4.8+lvlIdx*0.33; }
function slowOn(){ return activeBoosters.slow&&Date.now()<activeBoosters.slow; }

function spawnBall(){
  ballLaunched=false;
  balls=[{x:paddle.x+paddle.w/2,y:paddle.y-BALL_R-1,vx:0,vy:0,r:BALL_R,trail:[]}];
}

function launchBall(){
  if(ballLaunched||!balls.length) return;
  ballLaunched=true;
  var spd=baseSpeed()*(slowOn()?0.5:1);
  var ang=-Math.PI/2+(Math.random()-0.5)*0.4;
  balls[0].vx=Math.cos(ang)*spd;balls[0].vy=Math.sin(ang)*spd;
  SFX.paddle();
}

function activate(type){
  activeBoosters[type]=Date.now()+30000;
  if(type==='multi'){
    SFX.boostMulti();
    if(balls.length){
      var b=balls[0];
      var ang=Math.atan2(-b.vy,-b.vx);
      var spd=Math.hypot(b.vx,b.vy);
      balls.push({x:b.x,y:b.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:BALL_R,trail:[]});
    }
  }
  if(type==='wide') SFX.boostWide();
  if(type==='gun'){ SFX.boostGun(); gunTimer=0; }
  if(type==='pierce') SFX.boostPierce();
  if(type==='slow'){
    SFX.boostSlow();
    balls.forEach(function(b){
      var spd=Math.hypot(b.vx,b.vy)*0.5;
      var a=Math.atan2(b.vy,b.vx);
      b.vx=Math.cos(a)*spd;b.vy=Math.sin(a)*spd;
    });
  }
}

function initLevel(){
  wonLevel=false;
  bricks=buildLayout(LEVELS[lvlIdx].layout);
  capsules=[];bullets=[];activeBoosters={};
  paddle.w=PADDLE_W;
  paddle.x=W/2-paddle.w/2;
  spawnBall();updateHUD();
}

// Popup
var overlay=document.getElementById('overlay');
var ptitle=document.getElementById('ptitle'),psub=document.getElementById('psub');
var pdesc=document.getElementById('pdesc'),pstars=document.getElementById('pstars');
var pscore=document.getElementById('pscore'),pbtn=document.getElementById('pbtn');

function showLevelPopup(){
  gameOn=false;
  var ld=LEVELS[lvlIdx];
  ptitle.textContent='УРОВЕНЬ '+(lvlIdx+1);
  psub.textContent=ld.name;
  pdesc.textContent=ld.desc;
  pstars.style.display='none';pscore.style.display='none';
  pbtn.textContent='ИГРАТЬ';
  overlay.style.display='flex';
}

function showSuccess(){
  gameOn=false;
  var gained=score-levelStartScore;
  var s=gained/(bricks.length*100);
  var st=s>0.9?'⭐⭐⭐':s>0.5?'⭐⭐':'⭐';
  ptitle.textContent=lvlIdx+1===10?'🏆 ПОБЕДА!':'✅ ПРОЙДЕН!';
  psub.textContent=LEVELS[lvlIdx].name;
  pdesc.textContent=lvlIdx+1===10?'Все 10 уровней пройдены! Ты легенда!':'Отлично! Готовься к следующему.';
  pstars.textContent=st;pstars.style.display='block';
  pscore.textContent='СЧЁТ: '+score;pscore.style.display='block';
  pbtn.textContent=lvlIdx+1===10?'ЗАНОВО':'ДАЛЕЕ';
  overlay.style.display='flex';
}

function showGameOver(){
  gameOn=false;
  ptitle.textContent='💀 GAME OVER';
  psub.textContent='СЧЁТ: '+score;
  pdesc.textContent='Мяч упал. Начни заново!';
  pstars.style.display='none';pscore.style.display='none';
  pbtn.textContent='ЕЩЁ РАЗ';
  overlay.style.display='flex';
}

pbtn.addEventListener('click',function(){
  getAC();
  var t=pbtn.textContent;
  if(t==='ЗАНОВО'){lvlIdx=0;score=0;lives=3;}
  else if(t==='ДАЛЕЕ'){lvlIdx++;}
  else if(t==='ЕЩЁ РАЗ'){lives=3;score=0;}
  levelStartScore=score;
  overlay.style.display='none';
  initLevel();gameOn=true;
});

function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=(lvlIdx+1)+'/10';
  document.getElementById('hLives').textContent='❤'.repeat(lives);
  if(score>best)best=score;
  document.getElementById('hBest').textContent=best;
}

function updateBoostHUD(){
  var now=Date.now();
  BOOSTS.forEach(function(type){
    var el=document.getElementById('bi-'+type);
    var tel=document.getElementById('bt-'+type);
    if(activeBoosters[type]&&now<activeBoosters[type]){
      el.classList.add('on');
      tel.textContent=Math.ceil((activeBoosters[type]-now)/1000)+'s';
    } else {
      if(activeBoosters[type]){
        // Booster just expired — restore effects
        if(type==='slow'){
          balls.forEach(function(b){
            var spd=Math.hypot(b.vx,b.vy);
            if(spd<0.1) return;
            var target=baseSpeed();
            var factor=target/spd;
            b.vx*=factor;b.vy*=factor;
          });
        }
        delete activeBoosters[type];
      }
      el.classList.remove('on');tel.textContent='';
    }
  });
}

document.addEventListener('keydown',function(e){
  keys[e.key]=true;getAC();
  if(e.key===' '||e.key==='Enter') launchBall();
});
document.addEventListener('keyup',function(e){keys[e.key]=false;});
C.addEventListener('mousemove',function(e){
  var r=C.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
});
C.addEventListener('click',function(){getAC();launchBall();});
C.addEventListener('touchmove',function(e){
  e.preventDefault();
  var r=C.getBoundingClientRect();
  mouseX=(e.touches[0].clientX-r.left)*(W/r.width);
},{passive:false});
C.addEventListener('touchstart',function(e){
  getAC();
  launchBall();
  var r=C.getBoundingClientRect();
  mouseX=(e.touches[0].clientX-r.left)*(W/r.width);
},{passive:true});

function update(){
  if(!gameOn) return;
  // Paddle
  if(keys['ArrowLeft']||keys['a']) paddle.x-=Math.floor(7*SC)||5;
  if(keys['ArrowRight']||keys['d']) paddle.x+=Math.floor(7*SC)||5;
  if(mouseX!==null) paddle.x=mouseX-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  var now=Date.now();
  var pierce=activeBoosters.pierce&&now<activeBoosters.pierce;
  var fire=false;
  var wide=activeBoosters.wide&&now<activeBoosters.wide;
  paddle.w=wide?Math.floor(PADDLE_W*2):PADDLE_W;

  balls.forEach(function(ball){
    // Stick to paddle before launch
    if(!ballLaunched&&ball===balls[0]){
      ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-1;
      return;
    }
    ball.trail.push({x:ball.x,y:ball.y});
    if(ball.trail.length>7) ball.trail.shift();
    ball.x+=ball.vx;ball.y+=ball.vy;

    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);SFX.wall();}
    if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);SFX.wall();}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);SFX.wall();}

    // Paddle
    if(ball.vy>0&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&
       ball.y+ball.r>=paddle.y&&ball.y-ball.r<=paddle.y+paddle.h){
      var rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      var ang=rel*0.9-Math.PI/2;
      var spd=Math.hypot(ball.vx,ball.vy);
      ball.vx=Math.cos(ang)*spd;ball.vy=-Math.abs(Math.sin(ang)*spd);
      ball.y=paddle.y-ball.r;
      SFX.paddle();
    }

    // Bricks
    for(var i=0;i<bricks.length;i++){
      var bk=bricks[i];
      if(!bk.alive) continue;
      if(ball.x+ball.r<bk.x||ball.x-ball.r>bk.x+bk.w) continue;
      if(ball.y+ball.r<bk.y||ball.y-ball.r>bk.y+bk.h) continue;

      bk.hp-=1;bk.flash=10;
      if(bk.hp<=0){
        bk.alive=false;score+=100*bk.maxHp;updateHUD();
        if(bk.maxHp>=3) SFX.breakHard(); else SFX.break();
        if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        if(bk.boost) capsules.push({x:bk.x+bk.w/2,y:bk.y+bk.h,type:bk.boost,vy:2.5,alive:true});
        if(!wonLevel&&bricks.every(function(b){return !b.alive;})){
          wonLevel=true;SFX.levelWin();
          if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
          setTimeout(showSuccess,200);
        }
      } else {
        SFX.hit();
      }
      if(!pierce){
        var ox=Math.min(ball.x+ball.r-bk.x,bk.x+bk.w-(ball.x-ball.r));
        var oy=Math.min(ball.y+ball.r-bk.y,bk.y+bk.h-(ball.y-ball.r));
        if(ox<oy) ball.vx=-ball.vx; else ball.vy=-ball.vy;
        break;
      }
    }
  });

  balls=balls.filter(function(b){return b.y-b.r<H;});
  if(!balls.length&&!wonLevel){
    lives--;updateHUD();
    if(lives<=0){
      SFX.gameOver();
      if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
      showGameOver();
    } else {
      SFX.loseLife();
      if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      spawnBall();
    }
  }

  capsules.forEach(function(cap){
    if(!cap.alive) return;
    cap.y+=cap.vy;
    if(cap.y+8>=paddle.y&&cap.y-8<=paddle.y+paddle.h&&
       cap.x+18>paddle.x&&cap.x-18<paddle.x+paddle.w){
      SFX.capsule();
      activate(cap.type);cap.alive=false;
    }
    if(cap.y>H) cap.alive=false;
  });
  capsules=capsules.filter(function(c){return c.alive;});

  // Gun auto-fire
  var gunOn=activeBoosters.gun&&Date.now()<activeBoosters.gun;
  if(gunOn&&gameOn){
    gunTimer--;
    if(gunTimer<=0){
      gunTimer=18;
      bullets.push({x:paddle.x+paddle.w*0.3, y:paddle.y-2, alive:true});
      bullets.push({x:paddle.x+paddle.w*0.7, y:paddle.y-2, alive:true});
      SFX.gunShot();
    }
  }

  // Bullet update
  var bulletSpd=Math.floor(10*SC)||6;
  bullets.forEach(function(bl){
    if(!bl.alive) return;
    bl.y-=bulletSpd;
    if(bl.y<0){bl.alive=false;return;}
    for(var i=0;i<bricks.length;i++){
      var bk=bricks[i];
      if(!bk.alive) continue;
      if(bl.x<bk.x||bl.x>bk.x+bk.w) continue;
      if(bl.y<bk.y||bl.y>bk.y+bk.h) continue;
      // Hit!
      bl.alive=false;
      bk.hp--;bk.flash=10;
      if(bk.hp<=0){
        bk.alive=false;score+=100*bk.maxHp;updateHUD();
        if(bk.maxHp>=3) SFX.breakHard(); else SFX.break();
        if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        if(bk.boost) capsules.push({x:bk.x+bk.w/2,y:bk.y+bk.h,type:bk.boost,vy:2.5,alive:true});
        if(!wonLevel&&bricks.every(function(b){return !b.alive;})){
          wonLevel=true;SFX.levelWin();
          if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
          setTimeout(showSuccess,200);
        }
      } else { SFX.hit(); }
      break;
    }
  });
  bullets=bullets.filter(function(bl){return bl.alive;});

  updateBoostHUD();
}

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function lc(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.min(255,r+amt)+','+Math.min(255,g+amt)+','+Math.min(255,b+amt)+')';
}
function dc(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.max(0,r-amt)+','+Math.max(0,g-amt)+','+Math.max(0,b-amt)+')';
}

function draw(){
  ctx.fillStyle='#061020';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,60,120,0.07)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  var now=Date.now();
  var fire=false;
  var pierce=activeBoosters.pierce&&now<activeBoosters.pierce;
  var slow=activeBoosters.slow&&now<activeBoosters.slow;
  var multi=activeBoosters.multi&&now<activeBoosters.multi;
  var wide=activeBoosters.wide&&now<activeBoosters.wide;

  // Bricks
  bricks.forEach(function(bk){
    if(!bk.alive) return;
    var flash=bk.flash>0;if(bk.flash>0) bk.flash--;
    var hpR=bk.hp/bk.maxHp;
    if(bk.boost){
      var g=ctx.createLinearGradient(bk.x,bk.y,bk.x,bk.y+bk.h);
      g.addColorStop(0,flash?'#ffffff':'#ffe566');
      g.addColorStop(0.5,'#ffd700');g.addColorStop(1,'#b8860b');
      ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
      ctx.fillStyle=g;rr(bk.x+1,bk.y+1,bk.w-2,bk.h-2,4);ctx.fill();
      ctx.shadowBlur=0;
      ctx.font=(bk.h-4)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(BICON[bk.boost],bk.x+bk.w/2+1,bk.y+bk.h/2+2);
      ctx.fillStyle='#fff';ctx.fillText(BICON[bk.boost],bk.x+bk.w/2,bk.y+bk.h/2);
    } else {
      var g=ctx.createLinearGradient(bk.x,bk.y,bk.x,bk.y+bk.h);
      g.addColorStop(0,flash?'#ffffff':lc(bk.color,50));
      g.addColorStop(1,flash?'#aaaaaa':dc(bk.color,50));
      ctx.shadowColor=bk.color;ctx.shadowBlur=flash?10:3;
      ctx.fillStyle=g;rr(bk.x+1,bk.y+1,bk.w-2,bk.h-2,4);ctx.fill();
      ctx.shadowBlur=0;
      if(bk.maxHp>1&&hpR<1){
        ctx.fillStyle='rgba(0,0,0,'+(0.35*(1-hpR))+')';
        rr(bk.x+1,bk.y+1,bk.w-2,bk.h-2,4);ctx.fill();
        if(hpR<0.7){ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;
          ctx.beginPath();ctx.moveTo(bk.x+8,bk.y+3);ctx.lineTo(bk.x+18,bk.y+bk.h-3);ctx.stroke();}
        if(hpR<0.4){ctx.beginPath();ctx.moveTo(bk.x+bk.w-8,bk.y+3);ctx.lineTo(bk.x+bk.w-18,bk.y+bk.h-3);ctx.stroke();}
      }
    }
  });

  // Capsules
  capsules.forEach(function(cap){
    var col=BCOL[cap.type];
    ctx.shadowColor=col;ctx.shadowBlur=12;
    var g=ctx.createLinearGradient(cap.x-18,cap.y-8,cap.x+18,cap.y+8);
    g.addColorStop(0,col);g.addColorStop(1,'#333');
    ctx.fillStyle=g;rr(cap.x-18,cap.y-8,36,16,8);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    rr(cap.x-18,cap.y-8,36,16,8);ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText(BICON[cap.type],cap.x,cap.y+1);
  });

  // Bullets
  bullets.forEach(function(bl){
    ctx.shadowColor='#ffaa44';ctx.shadowBlur=8;
    ctx.fillStyle='#ffee88';
    ctx.beginPath();ctx.ellipse(bl.x,bl.y-4,2,5,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Paddle
  var gunOn2=activeBoosters.gun&&now<activeBoosters.gun;
  var pg=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
  var pGlow=gunOn2?'#ff8844':pierce?'#aaddff':slow?'#33ddff':multi?'#ffdd33':wide?'#66ffaa':'#33aaff';
  pg.addColorStop(0,gunOn2?'#ffbb66':pierce?'#99eeff':slow?'#55ddff':wide?'#99ffcc':'#66bbff');
  pg.addColorStop(1,gunOn2?'#cc4400':pierce?'#224488':slow?'#115588':wide?'#116633':'#1155aa');
  ctx.shadowColor=pGlow;ctx.shadowBlur=16;
  ctx.fillStyle=pg;rr(paddle.x,paddle.y,paddle.w,paddle.h,7);ctx.fill();
  ctx.shadowBlur=0;

  // Balls
  balls.forEach(function(ball){
    ball.trail.forEach(function(pt,i){
      var a=(i+1)/ball.trail.length*0.3;
      var rad=ball.r*(i+1)/ball.trail.length;
      ctx.beginPath();ctx.arc(pt.x,pt.y,rad,0,Math.PI*2);
      ctx.fillStyle=fire?'rgba(255,100,0,'+a+')':'rgba(0,180,255,'+a+')';
      ctx.fill();
    });
    ctx.shadowColor=fire?'#ff6600':'#00d4ff';ctx.shadowBlur=16;
    var bg=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
    bg.addColorStop(0,fire?'#fff0aa':'#cceeff');
    bg.addColorStop(1,fire?'#ff4400':'#0077ff');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Launch hint
  if(gameOn&&!ballLaunched){
    var pulse=0.6+0.4*Math.sin(Date.now()/250);
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#00d4ff';
    ctx.font='bold 13px Courier New';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('КЛИК / ПРОБЕЛ — ЗАПУСК',W/2,H/2+80);
    ctx.globalAlpha=1;
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}

// Boot
initLevel();loop();
</script>
